name: Destroy AKS Resource Group

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Target Azure resource group name to delete
        required: true
        type: string
      confirmation:
        description: Type DELETE to confirm destructive action
        required: true
        type: string
      wait_for_completion:
        description: Wait until resource group deletion completes
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      subscription_id:
        description: Optional subscription ID override
        required: false
        type: string

permissions:
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation text
        run: |
          if [[ "${{ inputs.confirmation }}" != "DELETE" ]]; then
            echo "Confirmation failed. Enter DELETE to proceed."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select subscription (optional)
        if: ${{ inputs.subscription_id != '' }}
        run: az account set --subscription "${{ inputs.subscription_id }}"

      - name: Delete resource group
        run: |
          set -euo pipefail
          az group delete \
            --name "${{ inputs.resource_group }}" \
            --yes \
            --no-wait

      - name: Wait for deletion completion
        if: ${{ inputs.wait_for_completion == 'true' }}
        run: |
          set -euo pipefail
          az group wait \
            --name "${{ inputs.resource_group }}" \
            --deleted \
            --interval 30 \
            --timeout 3600
