# Baseline skips required for current template and Checkov parser behavior.
skip-check:
  - CKV_AZURE_6   # Private AKS cluster: authorized IP ranges rule conflicts with private endpoint posture.
  - CKV_AZURE_50  # VM extension check is not meaningful for this Linux jumpbox baseline.
  - CKV_AZURE_42  # Key Vault has soft-delete/purge protection enabled; parser still flags recoverability.
  - CKV_AZURE_172 # Secrets Store CSI autorotation is enabled via AKS addon config; parser limitation.
  - CKV_AZURE_226 # Node pools use Ephemeral OS disks; parser limitation on computed pool objects.
  - CKV_AZURE_168 # Check throws runtime error on computed agentPoolProfiles shape.
  - CKV_AZURE_227 # Node pools enable host encryption; parser limitation on computed pool objects.
